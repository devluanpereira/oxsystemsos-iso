---
modules-search: [ local ]

instances:
- id: detect_live_rootfs
  module: shellprocess
  config: detect-live-rootfs.conf
  weight: 1
- id: prepare_target
  module: shellprocess
  config: prepare-target.conf
  weight: 2
- id: cleanup_target
  module: shellprocess
  config: cleanup-target.conf
  weight: 2
- id: write_grub_config
  module: shellprocess
  config: write-grub-config.conf
  weight: 2
- id: verify_boot_artifacts
  module: shellprocess
  config: verify-boot-artifacts.conf
  weight: 2

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - shellprocess@detect_live_rootfs
  - unpackfsc
  - shellprocess@prepare_target
  - machineid
  - locale
  - keyboard
  - localecfg
  - fstab
  - initcpiocfg
  - initcpio
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - bootloader
  - shellprocess@write_grub_config
  - shellprocess@verify_boot_artifacts
  - shellprocess@cleanup_target
  - umount
- show:
  - finished

branding: oxsystemsos
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
hide-back-and-next-during-exec: false
quit-at-end: false
